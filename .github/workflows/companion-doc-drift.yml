name: Companion doc drift

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  version-alignment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: README title page vs VERSION.md
        run: python scripts/check_companion_version.py
